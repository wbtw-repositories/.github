name: Back-merge (reusable)

# Org-shared back-merge workflow — Ref infra#624 Phase 3a, infra#429.
#
# Ports the per-repo back-merge logic (originally landed in
# app.diagnostic.ly/.github/workflows/back-merge-main.yml) to a single
# source-of-truth callable workflow. Each consuming repo invokes this
# via `uses: wbtw-repositories/.github/.github/workflows/back-merge.yml@main`
# in a thin shim workflow that only specifies its targets list.
#
# Behaviour preserved from the app.diag original:
#   - For each lower branch in the targets list, computes drift vs main.
#   - Opens a sync PR labelled `auto-back-merge` if drift exists and no
#     open PR already targets that branch.
#   - Conflicts skip the push and surface a warning — no PRs with conflict
#     markers ever get pushed.
#   - Enables auto-merge on the opened PR so it self-closes once CI is green.
#   - Notifies #devops on workflow failure (5-days-red anti-pattern from
#     infra#417).
#
# Consumer shim example (place in each repo as .github/workflows/back-merge.yml):
#
#   name: Back-merge main → lower branches
#   on:
#     push:
#       branches: [main]
#     workflow_dispatch:
#   jobs:
#     back-merge:
#       uses: wbtw-repositories/.github/.github/workflows/back-merge.yml@main
#       with:
#         targets: '["uat", "develop"]'
#       secrets:
#         PROMOTION_PAT: ${{ secrets.PROMOTION_PAT }}
#         SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}

on:
  workflow_call:
    inputs:
      targets:
        description: 'JSON array of lower branches to back-merge into (e.g. ''["uat", "develop"]'')'
        required: true
        type: string
      slack_channel:
        description: 'Slack channel ID for failure notifications'
        required: false
        type: string
        default: 'C0AN2CMS6BT'
    secrets:
      PROMOTION_PAT:
        description: 'PAT with write permission to open PRs across protected branches. Falls back to GITHUB_TOKEN if unset.'
        required: false
      SLACK_BOT_TOKEN:
        description: 'Slack bot token for failure notifications. If unset, notify step is skipped.'
        required: false

permissions:
  contents: write
  pull-requests: write

jobs:
  back-merge:
    name: ${{ matrix.target }} <- main
    strategy:
      fail-fast: false
      matrix:
        target: ${{ fromJSON(inputs.targets) }}
    runs-on: ubuntu-latest
    timeout-minutes: 10

    concurrency:
      group: back-merge-${{ github.repository }}-${{ matrix.target }}
      cancel-in-progress: false

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.PROMOTION_PAT || github.token }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Compute drift
        id: drift
        env:
          GH_TOKEN: ${{ secrets.PROMOTION_PAT || github.token }}
        run: |
          AHEAD=$(gh api "repos/$GITHUB_REPOSITORY/compare/${{ matrix.target }}...main" --jq '.ahead_by // 0')
          echo "ahead=$AHEAD" >> "$GITHUB_OUTPUT"
          echo "main has $AHEAD commits ${{ matrix.target }} doesn't have"

      - name: Skip if no drift
        if: steps.drift.outputs.ahead == '0'
        run: echo "::notice::main and ${{ matrix.target }} are in sync — nothing to back-merge"

      - name: Look for existing open back-merge PR
        if: steps.drift.outputs.ahead != '0'
        id: existing
        env:
          GH_TOKEN: ${{ secrets.PROMOTION_PAT || github.token }}
        run: |
          EXISTING=$(gh pr list \
            --base "${{ matrix.target }}" \
            --state open \
            --label "auto-back-merge" \
            --json number,headRefName \
            --jq '.[] | select(.headRefName | startswith("sync/main-to-${{ matrix.target }}")) | .number' \
            | head -1)
          if [ -n "$EXISTING" ]; then
            echo "::notice::Existing auto-back-merge PR #$EXISTING is open for ${{ matrix.target }} — skipping new PR (it will pick up new commits on its next sync)"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Open back-merge PR
        if: steps.drift.outputs.ahead != '0' && steps.existing.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.PROMOTION_PAT || github.token }}
          AHEAD: ${{ steps.drift.outputs.ahead }}
        run: |
          DATE=$(date +%Y-%m-%d)
          BR="sync/main-to-${{ matrix.target }}-${DATE}-${{ github.run_id }}"
          git fetch origin main "${{ matrix.target }}"
          git checkout -b "$BR" "origin/${{ matrix.target }}"

          if git merge origin/main --no-ff -m "merge: main → ${{ matrix.target }} — auto-back-merge ($AHEAD commits)"; then
            git push origin "$BR"

            BODY=$(cat <<BODY_EOF
          ## Auto-back-merge

          Automated PR opened by the org-shared \`back-merge.yml\` workflow because main has $AHEAD commits that \`${{ matrix.target }}\` is missing.

          **Drift size:** $AHEAD commits

          If checks are green and there are no concerns, this can be admin-merged. The merge was clean (no conflicts).

          **Why this exists:** infra#429 audit caught accumulated drift across all 4 GDT repos. infra#624 Phase 3a moved this workflow to org-shared so all repos get the same behaviour without per-repo drift.

          **Triggered by:** $GITHUB_SHA on main.
          **Workflow run:** [$GITHUB_RUN_ID](https://github.com/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID)
          BODY_EOF
          )

            PR_URL=$(gh pr create \
              --base "${{ matrix.target }}" --head "$BR" \
              --title "sync: main → ${{ matrix.target }} — auto-back-merge ($AHEAD commits)" \
              --body "$BODY" \
              --label "auto-back-merge")

            # Enable auto-merge so the PR self-closes once CI is green.
            # If auto-merge is disabled at the repo level the call returns
            # non-zero — the PR still stays open with the auto-back-merge
            # label, matching the original app.diag behaviour. Never fail
            # the workflow on this fallback path.
            if [ -n "$PR_URL" ]; then
              if gh pr merge "$PR_URL" --auto --merge 2>&1; then
                echo "::notice::Auto-merge enabled on $PR_URL — will merge when checks pass"
              else
                echo "::warning::Could not enable auto-merge on $PR_URL — PR remains open for manual merge (auto-merge may be disabled at repo or branch level)"
              fi
            fi
          else
            echo "::warning::Merge conflicts detected on main → ${{ matrix.target }}. Branch NOT pushed; manual back-merge required. Drift: $AHEAD commits."
            git merge --abort 2>/dev/null || true
          fi

      - name: Notify #devops on failure
        if: failure()
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL: ${{ inputs.slack_channel }}
        run: |
          if [ -z "$SLACK_BOT_TOKEN" ]; then
            echo "::warning::SLACK_BOT_TOKEN not set — skipping notify"
            exit 0
          fi
          curl -sS -X POST https://slack.com/api/chat.postMessage \
            -H "Authorization: Bearer $SLACK_BOT_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{
              \"channel\": \"$SLACK_CHANNEL\",
              \"text\": \":rotating_light: *Back-merge failed* on \`${{ github.repository }}\` — main → ${{ matrix.target }}: <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|view run>\",
              \"unfurl_links\": false
            }" > /dev/null
