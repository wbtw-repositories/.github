name: Back-merge (reusable)

# Org-shared back-merge workflow — Ref infra#624 Phase 3a, infra#429.
#
# Reusable callable workflow that opens a PR back-merging the
# `source` branch into each branch in `targets`. Supports both the
# legacy single-stage matrix design (source=main, targets=[uat,
# develop]) and the 2-stage sequential design from the EPIC:
#
#   Stage 1 — consumer fires on push to main, calls with
#             source=main, targets=["uat"]
#   Stage 2 — consumer fires on push to uat, calls with
#             source=uat, targets=["develop"]
#
# Sequential is the EPIC's preferred design (prevents develop from
# landing ahead of uat, which would skip the staging-passed QA gate).
# Matrix is preserved for repos that don't have a uat branch or want
# parallel back-merges.
#
# Behaviour:
#   - For each target, computes drift vs source.
#   - Opens a sync PR labelled `auto-back-merge` if drift exists and
#     no open PR already targets that branch from the same source.
#   - Conflicts skip the push and surface a warning — no PRs with
#     conflict markers ever get pushed.
#   - Enables auto-merge on the opened PR so it self-closes once CI
#     is green (anti-loop guard on `sync/...: back-merge` in commit
#     message is implicit — these workflows only fire on push, never
#     on PR merge of a sync branch).
#   - Notifies #devops on workflow failure (anti-5-days-red from
#     infra#417).
#
# Consumer shim — sequential (recommended):
#
#   # .github/workflows/back-merge-stage1.yml
#   name: Back-merge main → uat
#   on:
#     push:
#       branches: [main]
#     workflow_dispatch:
#   jobs:
#     back-merge:
#       uses: wbtw-repositories/.github/.github/workflows/back-merge.yml@main
#       with:
#         source: main
#         targets: '["uat"]'
#       secrets:
#         PROMOTION_PAT: ${{ secrets.PROMOTION_PAT }}
#         SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
#
#   # .github/workflows/back-merge-stage2.yml
#   name: Back-merge uat → develop
#   on:
#     push:
#       branches: [uat]
#     workflow_dispatch:
#   jobs:
#     back-merge:
#       uses: wbtw-repositories/.github/.github/workflows/back-merge.yml@main
#       with:
#         source: uat
#         targets: '["develop"]'
#       secrets:
#         PROMOTION_PAT: ${{ secrets.PROMOTION_PAT }}
#         SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
#
# Consumer shim — legacy matrix (back-compat):
#
#   on:
#     push:
#       branches: [main]
#   jobs:
#     back-merge:
#       uses: wbtw-repositories/.github/.github/workflows/back-merge.yml@main
#       with:
#         targets: '["uat", "develop"]'
#       secrets: {...}

on:
  workflow_call:
    inputs:
      source:
        description: 'Source branch (commits flow FROM here INTO each target). Defaults to main.'
        required: false
        type: string
        default: 'main'
      targets:
        description: 'JSON array of branches to back-merge into. Sequential: ["uat"] for stage 1, ["develop"] for stage 2. Matrix (legacy): ["uat", "develop"].'
        required: true
        type: string
      slack_channel:
        description: 'Slack channel ID for failure notifications'
        required: false
        type: string
        default: 'C0AN2CMS6BT'
    secrets:
      PROMOTION_PAT:
        description: 'PAT with write permission to open PRs across protected branches. Falls back to GITHUB_TOKEN if unset.'
        required: false
      SLACK_BOT_TOKEN:
        description: 'Slack bot token for failure notifications. If unset, notify step is skipped.'
        required: false

permissions:
  contents: write
  pull-requests: write

jobs:
  back-merge:
    name: ${{ matrix.target }} <- ${{ inputs.source }}
    strategy:
      fail-fast: false
      matrix:
        target: ${{ fromJSON(inputs.targets) }}
    runs-on: ubuntu-latest
    timeout-minutes: 10

    concurrency:
      group: back-merge-${{ github.repository }}-${{ inputs.source }}-${{ matrix.target }}
      cancel-in-progress: false

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.PROMOTION_PAT || github.token }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Compute drift
        id: drift
        env:
          GH_TOKEN: ${{ secrets.PROMOTION_PAT || github.token }}
        run: |
          AHEAD=$(gh api "repos/$GITHUB_REPOSITORY/compare/${{ matrix.target }}...${{ inputs.source }}" --jq '.ahead_by // 0')
          echo "ahead=$AHEAD" >> "$GITHUB_OUTPUT"
          echo "${{ inputs.source }} has $AHEAD commits ${{ matrix.target }} doesn't have"

      - name: Skip if no drift
        if: steps.drift.outputs.ahead == '0'
        run: echo "::notice::${{ inputs.source }} and ${{ matrix.target }} are in sync — nothing to back-merge"

      - name: Look for existing open back-merge PR
        if: steps.drift.outputs.ahead != '0'
        id: existing
        env:
          GH_TOKEN: ${{ secrets.PROMOTION_PAT || github.token }}
        run: |
          EXISTING=$(gh pr list \
            --base "${{ matrix.target }}" \
            --state open \
            --label "auto-back-merge" \
            --json number,headRefName \
            --jq '.[] | select(.headRefName | startswith("sync/${{ inputs.source }}-to-${{ matrix.target }}")) | .number' \
            | head -1)
          if [ -n "$EXISTING" ]; then
            echo "::notice::Existing auto-back-merge PR #$EXISTING is open for ${{ inputs.source }} → ${{ matrix.target }} — skipping new PR (it will pick up new commits on its next sync)"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Open back-merge PR
        if: steps.drift.outputs.ahead != '0' && steps.existing.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.PROMOTION_PAT || github.token }}
          AHEAD: ${{ steps.drift.outputs.ahead }}
          SOURCE: ${{ inputs.source }}
          TARGET: ${{ matrix.target }}
        run: |
          DATE=$(date +%Y-%m-%d)
          BR="sync/${SOURCE}-to-${TARGET}-${DATE}-${{ github.run_id }}"
          git fetch origin "$SOURCE" "$TARGET"
          git checkout -b "$BR" "origin/${TARGET}"

          if git merge "origin/${SOURCE}" --no-ff -m "merge: ${SOURCE} → ${TARGET} — auto-back-merge ($AHEAD commits)"; then
            git push origin "$BR"

            BODY=$(cat <<BODY_EOF
          ## Auto-back-merge

          Automated PR opened by the org-shared \`back-merge.yml\` workflow because \`${SOURCE}\` has $AHEAD commits that \`${TARGET}\` is missing.

          **Drift size:** $AHEAD commits
          **Source:** \`${SOURCE}\`
          **Target:** \`${TARGET}\`

          If checks are green and there are no concerns, this can be admin-merged. The merge was clean (no conflicts).

          **Why this exists:** infra#624 Phase 3a — back-merge drift fix-up automation, sequential design prevents develop landing ahead of uat (which would skip the staging-passed QA gate).

          **Triggered by:** $GITHUB_SHA on \`${SOURCE}\`.
          **Workflow run:** [$GITHUB_RUN_ID](https://github.com/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID)
          BODY_EOF
          )

            PR_URL=$(gh pr create \
              --base "${TARGET}" --head "$BR" \
              --title "sync: ${SOURCE} → ${TARGET} — auto-back-merge ($AHEAD commits)" \
              --body "$BODY" \
              --label "auto-back-merge")

            if [ -n "$PR_URL" ]; then
              if gh pr merge "$PR_URL" --auto --merge 2>&1; then
                echo "::notice::Auto-merge enabled on $PR_URL — will merge when checks pass"
              else
                echo "::warning::Could not enable auto-merge on $PR_URL — PR remains open for manual merge (auto-merge may be disabled at repo or branch level)"
              fi
            fi
          else
            echo "::warning::Merge conflicts detected on ${SOURCE} → ${TARGET}. Branch NOT pushed; manual back-merge required. Drift: $AHEAD commits."
            git merge --abort 2>/dev/null || true
          fi

      - name: Notify #devops on failure
        if: failure()
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL: ${{ inputs.slack_channel }}
        run: |
          if [ -z "$SLACK_BOT_TOKEN" ]; then
            echo "::warning::SLACK_BOT_TOKEN not set — skipping notify"
            exit 0
          fi
          curl -sS -X POST https://slack.com/api/chat.postMessage \
            -H "Authorization: Bearer $SLACK_BOT_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{
              \"channel\": \"$SLACK_CHANNEL\",
              \"text\": \":rotating_light: *Back-merge failed* on \`${{ github.repository }}\` — ${{ inputs.source }} → ${{ matrix.target }}: <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|view run>\",
              \"unfurl_links\": false
            }" > /dev/null
