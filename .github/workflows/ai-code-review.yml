# Reusable AI Code Review + Auto-Fix Workflow for GDT
# Called from individual repos via workflow_call.
#
# Usage in any repo:
#   jobs:
#     ai-review:
#       uses: wbtw-repositories/.github/.github/workflows/ai-code-review.yml@main
#       with:
#         stack: nodejs
#         lint-command: 'npx tsc --noEmit'
#         repo-context: 'Node API — Bun runtime, TypeScript'
#       secrets: inherit

name: AI Code Review

on:
  workflow_call:
    inputs:
      stack:
        description: 'Technology stack: nodejs, php, laravel, wordpress'
        required: true
        type: string
      lint-command:
        description: 'Lint/type-check command for auto-fix verification'
        required: false
        type: string
        default: 'echo "no lint configured"'
      repo-context:
        description: 'Repository-specific context for the review prompt'
        required: false
        type: string
        default: ''
    secrets:
      GITHUB_TOKEN:
        required: true

permissions:
  contents: write
  pull-requests: write

jobs:
  ai-review:
    name: AI Review
    runs-on: [self-hosted, gdt-ai]
    if: |
      !contains(github.event.pull_request.labels.*.name, 'skip-ai-review') &&
      !contains(github.event.pull_request.labels.*.name, 'ai-reviewed')

    env:
      MAX_AUTO_FIX_ITERATIONS: 2
      PR_NUMBER: ${{ github.event.pull_request.number }}
      HEAD_BRANCH: ${{ github.event.pull_request.head.ref }}
      BASE_BRANCH: ${{ github.event.pull_request.base.ref }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git for auto-fix commits
        run: |
          git config user.name "gdt-admin"
          git config user.email "admin@diagnostic.ly"

      - name: Get PR diff
        id: diff
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if ! gh pr diff "$PR_NUMBER" > /tmp/pr-diff.txt 2>/dev/null; then
            echo "Warning: PR diff too large for GitHub API, using git diff instead"
            git diff "origin/$BASE_BRANCH...${{ github.event.pull_request.head.sha }}" --stat > /tmp/pr-diff.txt
            echo -e "\n---\n# Diff too large. Showing summary only:\n" >> /tmp/pr-diff.txt
            git diff "origin/$BASE_BRANCH...${{ github.event.pull_request.head.sha }}" --name-only >> /tmp/pr-diff.txt
          fi

          if [ $(wc -c < /tmp/pr-diff.txt) -gt 50000 ]; then
            head -c 50000 /tmp/pr-diff.txt > /tmp/pr-diff-truncated.txt
            echo -e "\n... (diff truncated - too large for full review)" >> /tmp/pr-diff-truncated.txt
            mv /tmp/pr-diff-truncated.txt /tmp/pr-diff.txt
          fi

          PR_TITLE=$(gh pr view "$PR_NUMBER" --json title -q '.title')
          PR_BODY=$(gh pr view "$PR_NUMBER" --json body -q '.body' | head -c 2000)
          echo "PR_TITLE=$PR_TITLE" >> $GITHUB_ENV
          echo "$PR_BODY" > /tmp/pr-body.txt

          # Get list of changed files for auto-fix scoping
          gh pr diff "$PR_NUMBER" --name-only > /tmp/pr-changed-files.txt 2>/dev/null || \
            git diff --name-only "origin/$BASE_BRANCH...${{ github.event.pull_request.head.sha }}" > /tmp/pr-changed-files.txt
          echo "Changed files:"
          cat /tmp/pr-changed-files.txt

      - name: Build stack-specific review context
        id: stack-context
        run: |
          STACK="${{ inputs.stack }}"
          REPO_CONTEXT="${{ inputs.repo-context }}"

          # Base prompt — shared across all stacks
          cat > /tmp/stack-context.txt << 'STACK_EOF'
          You are a senior code reviewer for GDT's diagnostic.ly platform — a HIPAA-compliant
          multi-tenant healthcare SaaS. The platform consists of 5 components:

          - WordPress (wp-mlb)
          - Node API (diagnostic.ly-nodejs) — Bun runtime, TypeScript
          - WHMgr Laravel (whmgr-laravel) — PHP 8.1, Laravel 11
          - WHMgr Node (whmgr-node)
          - App PHP (app.diagnostic.ly) — PHP 8.1

          Infrastructure: AWS us-west-2, MySQL on EC2, deployed via GitHub Actions (OIDC + SSM).
          STACK_EOF

          # Stack-specific focus
          case "$STACK" in
            nodejs)
              cat >> /tmp/stack-context.txt << 'EOF'

          STACK FOCUS: Node.js / TypeScript
          - TypeScript strict mode — ensure proper typing, no `any` abuse
          - Bun runtime — watch for Bun-specific APIs vs Node.js
          - Type-check command: `npx tsc --noEmit`
          - Zod for input validation
          - Express/Hono middleware patterns
          - Async error handling (try/catch, .catch() on promises)
          - No eval() or Function() with user input
          - Missing auth middleware on routes
          EOF
              ;;
            php)
              cat >> /tmp/stack-context.txt << 'EOF'

          STACK FOCUS: PHP 8.1
          - PHP type hints on all function params and return types
          - PDO prepared statements — never concatenate user input into SQL
          - Input validation and sanitization
          - Error handling with try/catch
          - constants.php and .env contain secrets — NEVER log or expose them
          - `php -l` for syntax checking
          EOF
              ;;
            laravel)
              cat >> /tmp/stack-context.txt << 'EOF'

          STACK FOCUS: Laravel 11 / PHP 8.1
          - Eloquent over raw queries — use scopes, relationships
          - Mass assignment protection — $fillable or $guarded on every model
          - CSRF protection on all forms
          - Laravel validation rules on all controller inputs
          - Crypt facade for encrypting PHI at rest
          - Hashids for obfuscating IDs in URLs
          - Migrations must have down() method for rollback
          - `php artisan test --stop-on-failure` for verification
          - `php -l` for syntax checking
          EOF
              ;;
            wordpress)
              cat >> /tmp/stack-context.txt << 'EOF'

          STACK FOCUS: WordPress / WooCommerce
          - WordPress coding standards (WPCS)
          - All output must be escaped: esc_html(), esc_attr(), esc_url(), wp_kses()
          - Nonce verification on all form submissions and AJAX handlers
          - Use $wpdb->prepare() for ALL database queries — never raw SQL
          - Capability checks (current_user_can) before privileged operations
          - Multi-brand architecture — watch for hardcoded brand references
          - WooCommerce hooks and filters — proper priority ordering
          - `php -l` for syntax checking
          EOF
              ;;
          esac

          # Append repo-specific context if provided
          if [ -n "$REPO_CONTEXT" ]; then
            echo "" >> /tmp/stack-context.txt
            echo "REPO-SPECIFIC CONTEXT: $REPO_CONTEXT" >> /tmp/stack-context.txt
          fi

      - name: Run AI review
        id: review
        run: |
          # Build the full review prompt
          cat /tmp/stack-context.txt > /tmp/review-prompt.txt

          cat >> /tmp/review-prompt.txt << 'PROMPT_EOF'

          IMPORTANT: Only review code that was CHANGED in this PR diff. Do NOT flag pre-existing
          issues in unchanged lines. Focus exclusively on what this PR introduces or modifies.

          Review this PR diff for the following categories:

          ## 1. CRITICAL ISSUES (must fix before merge)
          - Security vulnerabilities (SQL injection, XSS, auth bypass)
          - PHI/PII exposure (logging patient data, improper access controls)
          - HIPAA violations (unencrypted PHI, missing audit trails)
          - Multi-tenant data isolation failures (cross-tenant leakage)
          - Breaking changes to public APIs
          - Data loss risks (migrations without rollback, destructive operations)

          ## 2. IMPORTANT ISSUES (should fix)
          - Missing error handling (try/catch, error boundaries)
          - Type safety concerns (TypeScript strict, PHP type hints)
          - Missing null/undefined checks
          - Incomplete migrations or schema changes
          - Missing input validation
          - Logic errors that could cause incorrect behavior

          ## 3. SUGGESTIONS (nice to have)
          - Code organization improvements
          - Performance optimizations
          - Better naming conventions
          - Missing documentation

          ## 4. POSITIVE NOTES
          - Well-implemented features
          - Good patterns used

          For each issue, provide:
          - **severity**: critical, high, medium, low
          - **category**: security, hipaa, logic-error, error-handling, convention-violation, code-quality
          - **file**: exact file path
          - **line**: approximate line number
          - **description**: what the issue is
          - **fix**: how to fix it (be specific enough for an AI to auto-fix)

          Format each issue as: `- **{category}** in `{file}:{line}`: {description} — Fix: {fix}`

          At the end, add a summary:
          ```
          REVIEW_SCORE: X/100
          CRITICAL_COUNT: N
          HIGH_COUNT: N
          MEDIUM_COUNT: N
          LOW_COUNT: N
          AUTO_FIXABLE: N
          VERDICT: PASS|NEEDS_FIXES|BLOCKED
          ```

          If no issues are found in a category, say "None found."

          ---
          PR Title: $PR_TITLE

          PR Description:
          PROMPT_EOF

          cat /tmp/pr-body.txt >> /tmp/review-prompt.txt
          echo "" >> /tmp/review-prompt.txt
          echo "Diff:" >> /tmp/review-prompt.txt
          cat /tmp/pr-diff.txt >> /tmp/review-prompt.txt

          if command -v claude &> /dev/null; then
            claude --print "$(cat /tmp/review-prompt.txt)" > /tmp/review-result.md 2>&1 || {
              echo "# AI Review" > /tmp/review-result.md
              echo "" >> /tmp/review-result.md
              echo "AI review unavailable - Claude CLI not responding." >> /tmp/review-result.md
              echo "" >> /tmp/review-result.md
              echo "REVIEW_SCORE: 0/100" >> /tmp/review-result.md
              echo "VERDICT: PASS" >> /tmp/review-result.md
            }
          else
            echo "# AI Review" > /tmp/review-result.md
            echo "" >> /tmp/review-result.md
            echo "AI review skipped - Claude CLI not available on this runner." >> /tmp/review-result.md
            echo "" >> /tmp/review-result.md
            echo "REVIEW_SCORE: 0/100" >> /tmp/review-result.md
            echo "VERDICT: PASS" >> /tmp/review-result.md
          fi

          # Parse review results
          CRITICAL_COUNT=$(grep -c "^\- \*\*security\|^\- \*\*hipaa" /tmp/review-result.md 2>/dev/null || echo "0")
          HIGH_COUNT=$(grep -c "^\- \*\*logic-error\|^\- \*\*error-handling" /tmp/review-result.md 2>/dev/null || echo "0")
          VERDICT=$(grep -oP 'VERDICT: \K\w+' /tmp/review-result.md 2>/dev/null || echo "PASS")

          if [ "$VERDICT" = "BLOCKED" ] || [ "$CRITICAL_COUNT" -gt 0 ]; then
            echo "has_critical=true" >> $GITHUB_OUTPUT
          else
            echo "has_critical=false" >> $GITHUB_OUTPUT
          fi

          if [ "$VERDICT" = "NEEDS_FIXES" ] || [ "$HIGH_COUNT" -gt 0 ]; then
            echo "has_important=true" >> $GITHUB_OUTPUT
          else
            echo "has_important=false" >> $GITHUB_OUTPUT
          fi

          echo "verdict=$VERDICT" >> $GITHUB_OUTPUT
          echo "review_complete=true" >> $GITHUB_OUTPUT

      # -- AUTO-FIX STEP -------------------------------------------------------
      - name: Auto-fix issues
        id: autofix
        if: steps.review.outputs.has_critical == 'true' || steps.review.outputs.has_important == 'true'
        run: |
          echo "AI review found issues — attempting auto-fix..."

          CHANGED_FILES=$(cat /tmp/pr-changed-files.txt | tr '\n' ' ')
          REVIEW_FINDINGS=$(cat /tmp/review-result.md)
          FIXED_COUNT=0
          ITERATION=0
          LINT_CMD="${{ inputs.lint-command }}"

          while [ $ITERATION -lt $MAX_AUTO_FIX_ITERATIONS ]; do
            ITERATION=$((ITERATION + 1))
            echo "Auto-fix iteration $ITERATION/$MAX_AUTO_FIX_ITERATIONS..."

            if ! command -v claude &> /dev/null; then
              echo "Claude CLI not available — skipping auto-fix"
              break
            fi

            # Build fix prompt with review findings + file contents
            FIX_PROMPT="You are fixing issues found by an AI code review on a GDT healthcare platform PR.

          IMPORTANT RULES:
          - ONLY modify files that are part of this PR: $CHANGED_FILES
          - Do NOT modify any other files
          - Do NOT add new features — only fix the identified issues
          - Do NOT change business logic unless it's a bug identified in the review
          - Preserve all existing functionality
          - Use the same code style as the rest of the file

          ## Review Findings to Fix:

          $REVIEW_FINDINGS

          ## Instructions:
          1. Read each file listed in the review findings
          2. Fix all CRITICAL and IMPORTANT issues identified above
          3. For each fix, make the minimal change needed
          4. Run lint/type-check after fixing: $LINT_CMD
          5. If lint fails on lines YOU changed, fix those too
          6. Do NOT fix pre-existing lint errors in unchanged code

          Fix all issues now."

            # Run Claude Code headlessly to apply fixes
            claude --dangerously-skip-permissions "$FIX_PROMPT" > /tmp/fix-output-$ITERATION.txt 2>&1 || true

            # Check if any files were modified
            if git diff --quiet; then
              echo "No changes made in iteration $ITERATION — stopping"
              break
            fi

            # Count and commit fixes
            CHANGED=$(git diff --name-only | wc -l)
            echo "Auto-fix iteration $ITERATION modified $CHANGED file(s)"

            git add -A
            git commit -m "fix: auto-fix AI review feedback (iteration $ITERATION)

          Applied automated fixes for issues found by AI code review.
          See PR comments for details.

          Co-Authored-By: Claude <noreply@anthropic.com>" || {
              echo "Nothing to commit in iteration $ITERATION"
              break
            }

            FIXED_COUNT=$((FIXED_COUNT + CHANGED))

            # Re-run review on the LOCAL diff (not remote — fixes haven't been pushed yet)
            if [ $ITERATION -lt $MAX_AUTO_FIX_ITERATIONS ]; then
              echo "Re-checking after fixes..."
              git diff "origin/$BASE_BRANCH...HEAD" > /tmp/pr-diff-local.txt 2>/dev/null || true

              cat > /tmp/recheck-prompt.txt << 'RECHECK_EOF'
          Re-review the code after auto-fixes were applied. Check if the previously identified
          CRITICAL and IMPORTANT issues have been resolved. Only report issues that still remain.
          RECHECK_EOF

              echo "" >> /tmp/recheck-prompt.txt
              echo "Previous findings:" >> /tmp/recheck-prompt.txt
              cat /tmp/review-result.md >> /tmp/recheck-prompt.txt
              echo "" >> /tmp/recheck-prompt.txt
              echo "Current diff:" >> /tmp/recheck-prompt.txt
              head -c 40000 /tmp/pr-diff-local.txt >> /tmp/recheck-prompt.txt
              echo "" >> /tmp/recheck-prompt.txt
              echo "Report remaining issues in the same format. If all issues are fixed, say: VERDICT: PASS" >> /tmp/recheck-prompt.txt

              claude --print "$(cat /tmp/recheck-prompt.txt)" > /tmp/review-result.md 2>&1 || break

              RECHECK_VERDICT=$(grep -oP 'VERDICT: \K\w+' /tmp/review-result.md 2>/dev/null || echo "UNKNOWN")
              if [ "$RECHECK_VERDICT" = "PASS" ]; then
                echo "All issues resolved after iteration $ITERATION!"
                break
              fi
              echo "Issues remain after iteration $ITERATION — continuing..."
              REVIEW_FINDINGS=$(cat /tmp/review-result.md)
            fi
          done

          # Push all fix commits
          if [ $FIXED_COUNT -gt 0 ]; then
            git push origin "$HEAD_BRANCH" || {
              echo "Failed to push auto-fix commits"
              echo "fixes_pushed=false" >> $GITHUB_OUTPUT
              exit 0
            }
            echo "fixes_pushed=true" >> $GITHUB_OUTPUT
            echo "fixed_count=$FIXED_COUNT" >> $GITHUB_OUTPUT
            echo "iterations=$ITERATION" >> $GITHUB_OUTPUT
          else
            echo "fixes_pushed=false" >> $GITHUB_OUTPUT
            echo "fixed_count=0" >> $GITHUB_OUTPUT
            echo "iterations=$ITERATION" >> $GITHUB_OUTPUT
          fi

      # -- POST REVIEW COMMENT -------------------------------------------------
      - name: Post review comment
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const reviewContent = fs.readFileSync('/tmp/review-result.md', 'utf8');
            const fixesPushed = '${{ steps.autofix.outputs.fixes_pushed }}' === 'true';
            const fixedCount = '${{ steps.autofix.outputs.fixed_count }}' || '0';
            const iterations = '${{ steps.autofix.outputs.iterations }}' || '0';

            let autoFixSection = '';
            if (fixesPushed) {
              autoFixSection = `\n### Auto-Fixes Applied\n${fixedCount} file(s) were automatically fixed and pushed to this branch.\n`;
            } else if (iterations > 0) {
              autoFixSection = `\n### Auto-Fix Attempted\nAuto-fix was attempted but could not resolve all issues. Manual intervention required.\n`;
            }

            const verdict = '${{ steps.review.outputs.verdict }}' || 'UNKNOWN';
            const icon = verdict === 'PASS' ? '✅' : verdict === 'NEEDS_FIXES' ? '⚠️' : '❌';

            const body = `## ${icon} AI Code Review (GDT / diagnostic.ly)

            ${reviewContent}
            ${autoFixSection}

            ---
            <sub>Automated review + auto-fix by Claude for GDT HIPAA-compliant platform. Add \`skip-ai-review\` label to disable.</sub>`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number
            });

            const existingComment = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('AI Code Review')
            );

            if (existingComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existingComment.id,
                body: body
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body
              });
            }

      # -- LABEL + APPROVE/REJECT ----------------------------------------------
      - name: Add ai-reviewed label
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh label create "ai-reviewed" --color "7057ff" --force 2>/dev/null || true
          gh api repos/${{ github.repository }}/issues/$PR_NUMBER/labels \
            --method POST \
            --field 'labels[]=ai-reviewed'

      - name: Auto-approve (only if auto-approve label present)
        if: |
          contains(github.event.pull_request.labels.*.name, 'auto-approve') &&
          ((steps.review.outputs.has_critical != 'true' && steps.review.outputs.has_important != 'true') ||
          steps.autofix.outputs.fixes_pushed == 'true')
        uses: actions/github-script@v7
        with:
          script: |
            const fixesPushed = '${{ steps.autofix.outputs.fixes_pushed }}' === 'true';
            const body = fixesPushed
              ? 'AI Code Review (GDT) — Issues found and auto-fixed. Auto-approving (auto-approve label present).'
              : 'AI Code Review (GDT) — No issues found. Auto-approving (auto-approve label present).';

            const { data: reviews } = await github.rest.pulls.listReviews({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number
            });
            for (const review of reviews) {
              if (review.state === 'CHANGES_REQUESTED' && review.user.type === 'Bot') {
                await github.rest.pulls.dismissReview({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: context.issue.number,
                  review_id: review.id,
                  message: 'Issues resolved by auto-fix'
                });
              }
            }

            await github.rest.pulls.createReview({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              event: 'APPROVE',
              body: body
            });

      - name: Review passed — awaiting human approval
        if: |
          !contains(github.event.pull_request.labels.*.name, 'auto-approve') &&
          ((steps.review.outputs.has_critical != 'true' && steps.review.outputs.has_important != 'true') ||
          steps.autofix.outputs.fixes_pushed == 'true')
        uses: actions/github-script@v7
        with:
          script: |
            const fixesPushed = '${{ steps.autofix.outputs.fixes_pushed }}' === 'true';
            const baseBranch = '${{ github.event.pull_request.base.ref }}';
            let body = '✅ **AI Code Review passed**';
            if (fixesPushed) {
              body += ' (auto-fixes were applied)';
            }
            body += `.\n\nAwaiting human approval to merge into \`${baseBranch}\`.\n`;
            body += '_Add the `auto-approve` label to enable automatic approval for this PR._';

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body
            });

      - name: Request changes if issues remain after auto-fix
        if: |
          (steps.review.outputs.has_critical == 'true' || steps.review.outputs.has_important == 'true') &&
          steps.autofix.outputs.fixes_pushed != 'true'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.pulls.createReview({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              event: 'REQUEST_CHANGES',
              body: 'AI review found issues that could not be auto-fixed. Manual intervention required. See the AI Code Review comment above.'
            });

      - name: Fail check if critical issues remain unfixed
        if: |
          steps.review.outputs.has_critical == 'true' &&
          steps.autofix.outputs.fixes_pushed != 'true'
        run: |
          echo "❌ AI Code Review found CRITICAL issues that could not be auto-fixed:"
          echo ""
          grep -E "^\- \*\*(security|hipaa)" /tmp/review-result.md | head -10 || true
          echo ""
          echo "Options:"
          echo "  1. Fix manually and push"
          echo "  2. Add 'skip-ai-review' label to bypass"
          exit 1
